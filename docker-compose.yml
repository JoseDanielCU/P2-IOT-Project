services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: energy-community-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: energy_community
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: energy-community-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@postgres:5432/energy_community
      SECRET_KEY: supersecretkey-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      OPENAI_API_KEY: ${OPENAI_API_KEY} 
    volumes:
      - ./backend/app:/app/app  # Hot-reload for development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - energy-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner  # Use production build
    container_name: energy-community-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - energy-network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Custom network for inter-service communication
networks:
  energy-network:
    driver: bridge
