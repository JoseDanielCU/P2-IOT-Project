[pytest]
# Pytest configuration for Energy Community Platform

# Test discovery patterns
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    auth: Authentication tests
    energy: Energy tests
    slow: Slow running tests

# Coverage options
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__main__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
