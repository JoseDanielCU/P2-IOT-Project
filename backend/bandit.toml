# Bandit Security Configuration for P2-IOT-Project

[tool.bandit]
# Exclude test directories and migrations
exclude_dirs = [
    "/test",
    "/tests",
    "*/test_*.py",
    "*/migrations/",
    "*/venv/",
    "*/.venv/"
]

# Security tests to skip (if needed)
# Uncomment and add test IDs to skip specific checks
# skips = ["B201", "B301"]

# Confidence level: LOW, MEDIUM, HIGH
# Only report issues with at least MEDIUM confidence
# confidence = "MEDIUM"
