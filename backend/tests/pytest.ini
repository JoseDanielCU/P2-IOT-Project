[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: mark test as a unit test
    integration: mark test as an integration test
    happy_path: mark test as happy path (normal use case)
    sad_path: mark test as sad path (error scenario)
    edge_case: mark test as edge case scenario
